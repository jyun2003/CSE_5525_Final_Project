# configs/sft_baseline.yaml
# Baseline SFT configuration for Llama-3.2-1B on Tulu 3
model_name: "meta-llama/Llama-3.2-1B"
dataset: "tulu3"                
learning_rate: 0.0001
lr_schedule: "linear"
num_epochs: 1
batch_size: 128
max_length: 16384
lora_rank: 64
save_every: 500
eval_every: 500
infrequent_eval_every: 1000
wandb_project: "cse5525_sft"
max_steps: null
load_checkpoint_path: null
inline_evals: null